<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>登入頁面</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #121212;
                color: #ffffff;
                margin: 0;
                padding: 20px;
            }
            h1 {
                text-align: center;
            }
            .form-container {
                max-width: 400px;
                margin: auto;
                padding: 20px;
                background-color: #292929;
                border-radius: 8px;
                border: 1px solid #444;
            }
            label {
                display: block;
                margin-bottom: 5px;
            }
            input[type="text"],
            input[type="password"] {
                width: 100%;
                padding: 10px;
                margin-bottom: 15px;
                border: 1px solid #333;
                border-radius: 4px;
                background-color: #1a1a1a;
                color: #ffffff;
            }
            button {
                width: 100%;
                padding: 10px;
                background-color: #3a3a3a;
                color: #ffffff;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            button:hover {
                background-color: #444;
            }
            .register-link {
                text-align: center;
                margin-top: 10px;
            }
        </style>
    </head>
    <body>
        <h1>登入頁面</h1>

        <div class="form-container">
            <form id="loginForm" action="token_manager.html" method="GET">
                <label for="username">使用者名稱：</label>
                <input type="text" id="username" name="username" required />

                <label for="password">密碼：</label>
                <input type="password" id="password" name="password" required />

                <button type="submit">登入</button>
            </form>

            <div class="register-link">
                <a href="register.html" style="color: #ffffff">還沒有帳號？點此註冊</a>
            </div>
        </div>
    </body>
</html>
