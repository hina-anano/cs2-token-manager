<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Token 管理頁面</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #121212;
                color: #ffffff;
                margin: 0;
                padding: 20px;
            }
            h1 {
                text-align: center;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th,
            td {
                border: 1px solid #333;
                padding: 5px;
                text-align: left;
            }
            th {
                background-color: #444;
            }
            .edit-button {
                background-color: #3a3a3a;
                color: #ffffff;
                border: none;
                padding: 5px 10px;
                border-radius: 4px;
                cursor: pointer;
            }
            .edit-button:hover {
                background-color: #444;
            }
        </style>
    </head>
    <body>
        <h1>Token 管理頁面</h1>

        <table id="tokenTable">
            <thead>
                <tr>
                    <th>帳號名稱</th>
                    <!-- <th style="width: 150px">日期</th> -->
                    <th>購買日期</th>
                    <!-- 日期欄的寬度 -->
                    <th>類型</th>
                    <th>評分</th>
                    <th>狀態</th>
                    <th>VAC 次數</th>
                    <th>動作</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Token A</td>
                    <td>2023-03-10</td>
                    <td>類型 1</td>
                    <td>5</td>
                    <td>活躍</td>
                    <td>10</td>
                    <td><button class="edit-button">編輯</button></td>
                </tr>
                <tr>
                    <td>Token B</td>
                    <td>2023-03-11</td>
                    <td>類型 2</td>
                    <td>3</td>
                    <td>非活躍</td>
                    <td>5</td>
                    <td><button class="edit-button">編輯</button></td>
                </tr>
                <tr>
                    <td>Token C</td>
                    <td>2023-03-12</td>
                    <td>類型 3</td>
                    <td>4</td>
                    <td>活躍</td>
                    <td>8</td>
                    <td><button class="edit-button">編輯</button></td>
                </tr>
                <!-- 可根據需要添加更多數據 -->
            </tbody>
        </table>
    </body>
</html>
