<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Information Manager</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #121212;
                color: #ffffff;
                margin: 0;
                padding: 20px;
            }
            h1 {
                text-align: center;
            }
            form {
                max-width: 600px;
                margin: 0 auto;
                background: #1e1e1e;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            }
            input,
            select {
                width: 100%;
                padding: 10px;
                margin: 10px 0;
                border: 1px solid #333;
                border-radius: 4px;
                background: #292929;
                color: #ffffff;
            }
            button {
                background-color: #3a3a3a;
                color: #ffffff;
                padding: 10px 15px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                width: 100%;
            }
            button:hover {
                background-color: #444;
            }
            table {
                width: 100%;
                margin-top: 20px;
                border-collapse: collapse;
            }
            th,
            td {
                border: 1px solid #333;
                padding: 10px;
                text-align: left;
            }
            th {
                background-color: #444;
            }
        </style>
    </head>
    <body>
        <h1>Information Manager</h1>
        <form id="infoForm">
            <input type="text" id="name" placeholder="Name" required />
            <input type="date" id="date" required />
            <input type="text" id="type" placeholder="Type" required />
            <input type="number" id="rating" placeholder="Rating" min="1" max="5" required />
            <select id="status" required>
                <option value="">Select Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
            <input type="number" id="count" placeholder="Count" required />
            <button type="submit">Add Info</button>
        </form>
        <table id="infoTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Rating</th>
                    <th>Status</th>
                    <th>Count</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dynamic Rows Here -->
            </tbody>
        </table>

        <script>
            const form = document.getElementById("infoForm");
            const tableBody = document.querySelector("#infoTable tbody");

            form.addEventListener("submit", function (event) {
                event.preventDefault();

                const name = document.getElementById("name").value;
                const date = document.getElementById("date").value;
                const type = document.getElementById("type").value;
                const rating = document.getElementById("rating").value;
                const status = document.getElementById("status").value;
                const count = document.getElementById("count").value;

                const newRow = tableBody.insertRow();
                newRow.innerHTML = `
                <td>${name}</td>
                <td>${date}</td>
                <td>${type}</td>
                <td>${rating}</td>
                <td>${status}</td>
                <td>${count}</td>
            `;

                form.reset();
            });
        </script>
    </body>
</html>
